matrix:
  - mpi_on
  - mpi_off

mpi_on:
  build:
    modules:
      - ninja
    modules_package:
      - eckit:openmpi
    dependencies:
      - ecmwf/stack-dependencies@master
      - ecmwf/ecbuild@develop
    parallel: 64
    ntasks: 4

mpi_off:
  build:
    modules:
      - ninja
    dependencies:
      - ecmwf/stack-dependencies@master
      - ecmwf/ecbuild@develop
    parallel: 64
